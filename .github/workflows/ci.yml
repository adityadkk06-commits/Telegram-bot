name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-bot:
    name: Python Bot (IDX Stock Screener)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Syntax check
        run: |
          uv run python -m py_compile bot/main.py
          uv run python -m py_compile bot/alerts/scanner.py
          uv run python -m py_compile bot/alerts/signal_engine.py
          uv run python -m py_compile bot/services/data_service.py

      - name: Lint with ruff
        run: uv run ruff check bot/ || true

  node-packages:
    name: Node.js Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build

      - name: Typecheck API Server
        run: pnpm --filter @workspace/api-server run typecheck || true
